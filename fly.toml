# fly.toml — Mondiale (Nuxt + Socket.IO)
#
# Single-machine by design: the Socket.IO server holds its `io` instance in
# per-machine memory (see server/middleware/socket.server.ts) and uses the
# default polling->websocket upgrade. Running >1 machine without sticky
# sessions + a Redis pub/sub adapter causes "Session ID unknown" errors, so
# auto-scaling is intentionally disabled below.

app = "mondiale"
primary_region = "arn"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  # Never spin down: keeps game sessions and in-memory Socket.IO state alive.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 25

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
