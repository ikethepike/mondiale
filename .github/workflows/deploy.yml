name: Fly Deploy
on:
  push:
    branches:
      - main

  # Enable running workflow from actions tab
  workflow_dispatch:

# Don't let two pushes to main deploy at once; cancel the older run.
concurrency:
  group: fly-deploy
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --ha=false keeps Mondiale on a single machine: the Socket.IO server
      # holds its io instance in per-machine memory, so a second machine
      # without sticky sessions + a Redis adapter breaks live game sessions.
      - run: flyctl deploy --remote-only --ha=false
